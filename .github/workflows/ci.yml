name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vital30
          POSTGRES_PASSWORD: vital30_password
          POSTGRES_DB: vital30_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vital30 -d vital30_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/api
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://vital30:vital30_password@localhost:5432/vital30_db?schema=public
      TEST_DATABASE_URL: postgresql://vital30:vital30_password@localhost:5432/vital30_db?schema=public
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 15m
      CORS_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm run test
      - run: npm run test:e2e
      - run: npm run build

  admin:
    name: Admin lint, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  flutter:
    name: Flutter analyze and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
