# Dependabot keeps dependencies and CI actions patched.
# Grouped minor/patch PRs keep the noise down; majors come through individually
# so they get a deliberate review.
version: 2
updates:
  # NestJS API
  - package-ecosystem: npm
    directory: /services/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      api-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(api,deps)"

  # Public website (Next.js)
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      web-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(web,deps)"

  # Admin dashboard (Vite)
  - package-ecosystem: npm
    directory: /apps/admin
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      admin-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(admin,deps)"

  # Flutter mobile
  - package-ecosystem: pub
    directory: /apps/mobile
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(mobile,deps)"

  # GitHub Actions used by every workflow
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci,deps)"

  # Docker base images
  - package-ecosystem: docker
    directory: /services/api
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(docker,deps)"
  - package-ecosystem: docker
    directory: /apps/admin
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(docker,deps)"
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(docker,deps)"
