services:
  postgres:
    image: postgres:16
    container_name: vital30_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vital30}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vital30_password}
      POSTGRES_DB: ${POSTGRES_DB:-vital30_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vital30} -d ${POSTGRES_DB:-vital30_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: vital30_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dev-only SMTP catcher. Better Auth's reset/verification emails get
  # delivered here instead of a real provider; inspect them at
  # http://localhost:8025. Do NOT run this in production.
  mailpit:
    image: axllent/mailpit:latest
    container_name: vital30_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  redis_data:
