services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - vital30_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_prod_data:/data
    networks:
      - vital30_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      CONTACT_INBOX: ${CONTACT_INBOX}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      EMAIL_FROM: ${EMAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vital30_internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - vital30_internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Server-side rendering reaches the API over the internal Docker network
      # to avoid NAT hairpin (container -> host's own public IP blackholes, so
      # the SSR fetch hangs -> nginx returns 502). The browser still uses the
      # public NEXT_PUBLIC_API_BASE_URL below for client-side requests.
      API_INTERNAL_URL: http://api:3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - vital30_internal
    healthcheck:
      # Probe a lightweight metadata route, NOT "/". The home page runs a data
      # fetch on render and can exceed the 5s timeout → false "unhealthy" even
      # while the app serves fine. /robots.txt proves the Next.js server is up
      # without depending on the API being reachable.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/robots.txt || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # HTTPS config — REQUIRES Let's Encrypt certs at /etc/letsencrypt
      # (run certbot before deploying with this active, or nginx won't
      # start). For a brand-new server with no certs yet, switch to the
      # HTTP-only config first, deploy, get certs, then switch back:
      #   - ./deploy/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/prod-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - admin
      - web
    networks:
      - vital30_internal

networks:
  vital30_internal:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
