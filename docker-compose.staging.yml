# ==============================================================================
# Vital30 STAGING stack — runs ALONGSIDE prod on the same VPS.
# ==============================================================================
# Isolated from prod by: its own Compose project name, its own Postgres + Redis
# + volumes, its own internal network, and its own .env.staging. The ONLY thing
# it shares with prod is the single front-door nginx (in docker-compose.prod.yml)
# which reaches these containers over the shared `vital30_edge` network.
#
# Edge-facing services are named `staging-api` / `staging-web` / `staging-admin`
# (NOT `api`/`web`/`admin`) on purpose: a service registers its name as a DNS
# record on EVERY network it joins, so reusing prod's names on the shared edge
# network would make prod nginx's `api`/`web`/`admin` lookups ambiguous and
# could route prod traffic into staging. Unique names keep the two stacks apart.
#
#   Deploy:  ./scripts/deploy-staging.sh
# ==============================================================================
name: vital30-staging

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - vital30_staging_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_staging_data:/data
    networks:
      - vital30_staging_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  staging-api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      CONTACT_INBOX: ${CONTACT_INBOX}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      EMAIL_FROM: ${EMAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Daily cleanup cron deletes READ notifications older than this (default 90).
      NOTIFICATION_RETENTION_DAYS: ${NOTIFICATION_RETENTION_DAYS:-90}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vital30_staging_internal
      - vital30_edge
    healthcheck:
      # 127.0.0.1, not localhost: avoid the IPv6 ::1-first resolution trap.
      test: ["CMD-SHELL", "wget -q --tries=1 -O /dev/null http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  staging-admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - staging-api
    networks:
      - vital30_staging_internal
      - vital30_edge

  staging-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # SSR reaches the API over the internal Docker network (avoids NAT
      # hairpin). The browser uses the public NEXT_PUBLIC_API_BASE_URL.
      API_INTERNAL_URL: http://staging-api:3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    expose:
      - "3000"
    depends_on:
      - staging-api
    networks:
      - vital30_staging_internal
      - vital30_edge
    healthcheck:
      # 127.0.0.1, NOT localhost: the Next.js standalone server binds IPv4 only
      # (HOSTNAME=0.0.0.0), but inside the container localhost resolves to IPv6
      # ::1 first -> connection refused -> false unhealthy. /robots.txt is a
      # lightweight route that doesn't depend on the API being reachable.
      test: ["CMD-SHELL", "wget -q --tries=1 -O /dev/null http://127.0.0.1:3000/robots.txt || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  vital30_staging_internal:
    driver: bridge
  # Shared front-door network. The prod nginx joins this too and proxies the
  # staging hostnames to staging-web/api/admin over it. Created once on the VPS:
  #   docker network create vital30_edge
  vital30_edge:
    external: true

volumes:
  postgres_staging_data:
  redis_staging_data:
