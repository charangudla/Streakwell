# HTTPS nginx config — used AFTER Let's Encrypt certs exist.
#
# Flow (see docs/launch-checklist.md):
#   1. Deploy with the default prod.conf (HTTP) so the stack + DNS are live.
#   2. Stop nginx, run certbot --standalone for the 3 subdomains (one SAN cert).
#   3. Point the nginx `default.conf` mount at THIS file and restart nginx.
#
# This file references /etc/letsencrypt/... so it must NOT be the active
# config until those certs have been issued, or nginx will fail to start.

upstream vital30_api {
  server api:3000;
}
upstream vital30_admin {
  server admin:80;
}
upstream vital30_web {
  server web:3000;
}

# --- HTTP :80 → redirect everything to HTTPS -------------------------------
server {
  listen 80;
  listen [::]:80;
  server_name challenge.charangudla.com www.challenge.charangudla.com
              api.challenge.charangudla.com admin.challenge.charangudla.com;
  # Let's Encrypt HTTP-01 renewals via webroot (optional; standalone also works)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

# Bare-IP / unknown host over HTTP → bounce to the canonical site
server {
  listen 80 default_server;
  server_name _;
  return 301 https://challenge.charangudla.com$request_uri;
}

# --- api.challenge.charangudla.com → NestJS API ----------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name api.challenge.charangudla.com;

  ssl_certificate     /etc/letsencrypt/live/challenge.charangudla.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/challenge.charangudla.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  location / {
    proxy_pass http://vital30_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- admin.challenge.charangudla.com → React admin dashboard ---------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name admin.challenge.charangudla.com;

  ssl_certificate     /etc/letsencrypt/live/challenge.charangudla.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/challenge.charangudla.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  location / {
    proxy_pass http://vital30_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- www → apex redirect ---------------------------------------------------
server {
  listen 443 ssl;
  http2 on;
  server_name www.challenge.charangudla.com;

  ssl_certificate     /etc/letsencrypt/live/challenge.charangudla.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/challenge.charangudla.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  return 301 https://challenge.charangudla.com$request_uri;
}

# --- challenge.charangudla.com → Next.js public site -----------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name challenge.charangudla.com;

  ssl_certificate     /etc/letsencrypt/live/challenge.charangudla.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/challenge.charangudla.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  proxy_http_version 1.1;
  proxy_set_header Connection "";

  location /_next/static/ {
    proxy_pass http://vital30_web;
    proxy_cache_valid 200 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://vital30_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
