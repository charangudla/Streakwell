upstream vital30_api {
  server api:3000;
}

upstream vital30_admin {
  server admin:80;
}

upstream vital30_web {
  server web:3000;
}

# api.vital30.com → NestJS API
server {
  listen 80;
  server_name api.vital30.com;

  location / {
    proxy_pass http://vital30_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# admin.vital30.com → React admin dashboard
server {
  listen 80;
  server_name admin.vital30.com;

  location / {
    proxy_pass http://vital30_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# www.vital30.com → redirect to apex
server {
  listen 80;
  server_name www.vital30.com;
  return 301 $scheme://vital30.com$request_uri;
}

# vital30.com → Next.js public marketing site
server {
  listen 80;
  server_name vital30.com;

  proxy_http_version 1.1;
  proxy_set_header Connection "";

  location /_next/static/ {
    proxy_pass http://vital30_web;
    proxy_cache_valid 200 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://vital30_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Local dev/staging fallback — hits the VPS by IP without DNS.
server {
  listen 80 default_server;
  server_name localhost 127.0.0.1;

  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://vital30_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /admin/ {
    rewrite ^/admin/?(.*)$ /$1 break;
    proxy_pass http://vital30_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://vital30_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# SSL is intentionally deferred. After DNS is configured, add Let's Encrypt
# certificates with Certbot and redirect HTTP to HTTPS for all server blocks.
