upstream vital30_api {
  server api:3000;
}

upstream vital30_admin {
  server admin:80;
}

server {
  listen 80;
  server_name api.vital30.com;

  location / {
    proxy_pass http://vital30_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name admin.vital30.com;

  location / {
    proxy_pass http://vital30_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80 default_server;
  server_name localhost 127.0.0.1;

  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://vital30_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /admin/ {
    rewrite ^/admin/?(.*)$ /$1 break;
    proxy_pass http://vital30_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = / {
    return 302 /admin/;
  }
}

# SSL is intentionally deferred. After DNS is configured, add Let's Encrypt
# certificates with Certbot and redirect HTTP to HTTPS.
