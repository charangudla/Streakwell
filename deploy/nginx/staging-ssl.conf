# STAGING nginx routing — loaded ALONGSIDE prod-ssl.conf (as default.conf) in
# the SAME nginx container via `include /etc/nginx/conf.d/*.conf`.
#
# Mounted by docker-compose.prod.yml:
#   - ./deploy/nginx/staging-ssl.conf:/etc/nginx/conf.d/staging.conf:ro
#
# Why runtime DNS (resolver + variable proxy_pass) instead of static upstreams:
#   * nginx still starts even when the staging stack is down (a static upstream
#     to a missing host can abort startup / cache a dead IP).
#   * Redeploying staging gives its containers fresh IPs; with a per-request
#     resolver nginx picks them up automatically — no need to restart the
#     prod-shared nginx (which would briefly blip prod traffic).
# 127.0.0.11 is Docker's embedded DNS; ipv6=off because these containers are
# IPv4 on the bridge network.
#
# TLS: reuses the prod SAN cert lineage. The staging hostnames MUST be added to
# that cert (see scripts/deploy-staging.sh header + the runbook) or browsers
# will show a name-mismatch warning — nginx itself still starts either way.

# --- HTTP :80 -> redirect the staging hostnames to HTTPS --------------------
# NOTE: no `default_server` here — prod-ssl.conf already owns the :80 default.
server {
  listen 80;
  listen [::]:80;
  server_name staging.challenge.charangudla.com
              api.staging.challenge.charangudla.com
              admin.staging.challenge.charangudla.com;
  location / {
    return 301 https://$host$request_uri;
  }
}

# --- api.staging.challenge.charangudla.com -> staging NestJS API ------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name api.staging.challenge.charangudla.com;

  ssl_certificate     /etc/letsencrypt/live/challenge.charangudla.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/challenge.charangudla.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  location / {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $staging_api http://staging-api:3000;
    proxy_pass $staging_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- admin.staging.challenge.charangudla.com -> staging React admin ---------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name admin.staging.challenge.charangudla.com;

  ssl_certificate     /etc/letsencrypt/live/challenge.charangudla.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/challenge.charangudla.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  location / {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $staging_admin http://staging-admin:80;
    proxy_pass $staging_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- staging.challenge.charangudla.com -> staging Next.js public site -------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name staging.challenge.charangudla.com;

  ssl_certificate     /etc/letsencrypt/live/challenge.charangudla.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/challenge.charangudla.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  proxy_http_version 1.1;
  proxy_set_header Connection "";

  location /_next/static/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $staging_web http://staging-web:3000;
    proxy_pass $staging_web;
    proxy_cache_valid 200 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    proxy_set_header Host $host;
  }

  location / {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $staging_web http://staging-web:3000;
    proxy_pass $staging_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
